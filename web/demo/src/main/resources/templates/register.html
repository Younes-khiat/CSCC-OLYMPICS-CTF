<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bakery Register</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="container">
    <h1>Algerian Sweets Bakery</h1>
    <p class="subtitle">Create your account.</p>

    <div class="alert error" th:if="${error}" th:text="${error}"></div>

    <form method="post" action="/register" class="card">
        <label>
            Username
            <input type="text" name="username" required>
        </label>
        <label>
            Password
            <input type="password" name="password" required>
        </label>
        <button type="submit">Register</button>
    </form>

    <p class="hint">Already have an account? <a href="/login">Login</a>.</p>
</div>
</body>
</html>
